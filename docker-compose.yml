services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ruralcare_triage
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ruralcare_triage
      JWT_SECRET: change-this-to-a-random-secret-at-least-32-chars
      JWT_EXPIRES_IN: 24h
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      GOOGLE_CLOUD_VISION_API_KEY: ""
      OCR_ENGINE: tesseract
      MAX_FILE_SIZE_MB: 5
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/uploads

  frontend:
    build: .
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
